name: Update LeetCode Data

on:
  schedule:
    - cron: "0 0 * * *"   # every 6 hours - cron: "0 0 * * *"
  workflow_dispatch:        # allow manual run

jobs:
  update-leetcode:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Fetch LeetCode data
        run: |
          curl https://leetcode.com/graphql/ \
            -H "Content-Type: application/json" \
            -H "Referer: https://leetcode.com" \
            --data '{"query":"query userPublicProfile($username: String!) { matchedUser(username: $username) { username profile { ranking realName } } }","variables":{"username":"s13rw81"}}' \
            -o leetcode.json

      - name: Commit and push if changed
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"

          git add leetcode.json

          git diff --quiet && git diff --staged --quiet || git commit -m "chore: update LeetCode stats"

          git push